; ═══════════════════════════════════════════════════════════════
;  MyMod 配置文件
;  改动后重启游戏生效
; ═══════════════════════════════════════════════════════════════

[Demo]
; 启动时是否弹消息框证明 DLL 注入成功
;   1 = 弹（首次安装时建议开）
;   0 = 不弹（日常游戏建议关）
ShowStartupMessage = 1

; 是否在标题栏给所有 MessageBoxA 加上 "[MyMod hook]" 前缀
EnableMessageBoxHook = 1


[Movement]
; 启用"每日移动力翻倍"演示 hook
; 注意：默认地址是占位符，不一定对应你的 EXE 版本
;       hook 触发后只会写日志，不会真的改数值
;       要真的改数值，自己去修 src/hooks/hook_logic.cpp
EnableMovementMod = 0


[Logging]
; 日志级别  0=关  1=Error  2=Info  3=Debug
LogLevel = 2

; 日志文件名（位于游戏根目录）
LogFile = MyMod.log
