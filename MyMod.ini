; ═══════════════════════════════════════════════════════════════
;  MyMod 配置文件
;  改动后重启游戏生效
; ═══════════════════════════════════════════════════════════════

[Demo]
; 启动时是否弹消息框证明 DLL 注入成功
;   1 = 弹（首次安装时建议开）
;   0 = 不弹（日常游戏建议关）
ShowStartupMessage = 1

; 是否在标题栏给所有 MessageBoxA 加上 "[MyMod hook]" 前缀
EnableMessageBoxHook = 1


[Movement]
; 启用移动力 hook：H3Hero::CalcMaxMovement (0x4E5000)
; 启用后游戏每天 / 每次状态变化时会在 MyMod.log 记录英雄信息
; 这是验证 hook 流程是否打通的最佳测试
EnableMovementMod = 1


[CreatureColor]
; 启用生物名彩色化 - 阶段 1（dump 到 log）
; 进游戏后会遍历 H3CreatureInformation[] 把所有生物按阶级染色后写到 log
; 用于验证字段访问、颜色映射、HotA 新阵营是否被读到
EnableCreatureColor = 1


[Logging]
; 日志级别  0=关  1=Error  2=Info  3=Debug
LogLevel = 2

; 日志文件名（位于游戏根目录）
LogFile = MyMod.log
